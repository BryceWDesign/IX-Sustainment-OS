<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>IX Sustainment OS</title>
    <meta
      name="description"
      content="IX Sustainment OS — operator-grade sustainment triage, blocker visibility, approvals, and evidence."
    />
    <meta
      name="theme-color"
      content="#0b1020"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: rgba(255, 255, 255, 0.035);
        --border: rgba(230, 237, 243, 0.12);
        --text: #e6edf3;
        --muted: #9fb0c3;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        min-height: 100vh;
      }

      #root:empty::before {
        content: "Launching IX Sustainment OS…";
        display: grid;
        place-items: center;
        min-height: 100vh;
        color: var(--muted);
        letter-spacing: 0.2px;
        font-size: 14px;
      }

      noscript {
        display: block;
        margin: 24px;
        padding: 16px 18px;
        border: 1px solid rgba(248, 113, 113, 0.32);
        background: rgba(248, 113, 113, 0.08);
        color: #fecaca;
        border-radius: 12px;
        line-height: 1.5;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <noscript>
      IX Sustainment OS requires JavaScript to render the operator interface.
      Enable JavaScript to use the triage board, case detail, approvals, and
      evidence views.
    </noscript>
    <div id="root"></div>
    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
